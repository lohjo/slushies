substitutions:
  _REGION: europe-west1
  _REPO: slushies
  _SERVICE: slushies
  _MIGRATE_JOB: slushies-migrate

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - '-f'
      - 'Dockerfile'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${BUILD_ID}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest'
      - '--label=app=slushies'
      - '--label=component=backend'
      - '.'

  # Push to Artifact Registry (all tags)
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    waitFor: ['build']
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}'

  # Fail fast with a clear error if the migration gate job is missing.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: check-migrate-job
    waitFor: ['push']
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run jobs describe "${_MIGRATE_JOB}" --region="${_REGION}" >/dev/null 2>&1 || {
          echo "Cloud Run Job '${_MIGRATE_JOB}' not found in region '${_REGION}'."
          echo "Create it first, then retry Cloud Build."
          exit 1
        }

  # Run database migrations before rolling a new revision
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: migrate
    waitFor: ['check-migrate-job']
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - ${_MIGRATE_JOB}
      - '--region=${_REGION}'
      - '--wait'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    waitFor: ['migrate']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${BUILD_ID}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=300'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${BUILD_ID}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest'
