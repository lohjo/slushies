name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: platform_app

jobs:
  # ── Job 1: full pytest suite (SQLite in-memory, no external services) ───────
  test:
    name: Test suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: platform_app/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          FLASK_ENV: testing
        run: pytest tests/ -v --tb=short --strict-markers

  # ── Job 2: Alembic migration smoke (real PostgreSQL) ────────────────────────
  migration-smoke:
    name: Migration smoke (PostgreSQL)
    runs-on: ubuntu-latest
    needs: test          # only run if tests pass

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB: platform_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: platform_app/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: flask db upgrade — apply all migrations
        env:
          FLASK_ENV: production
          DATABASE_URL: postgresql://platform:platform@localhost:5432/platform_ci
          SECRET_KEY: ci-only-not-for-prod-000000000000000000000000000000
          GOOGLE_SHEET_ID: ci-placeholder
        run: flask db upgrade

      - name: Verify schema completeness
        env:
          DATABASE_URL: postgresql://platform:platform@localhost:5432/platform_ci
        run: |
          python - <<'PYEOF'
          import os, sys
          import sqlalchemy as sa

          engine = sa.create_engine(os.environ["DATABASE_URL"])
          with engine.connect() as conn:
              rows = conn.execute(sa.text(
                  "SELECT table_name FROM information_schema.tables "
                  "WHERE table_schema = 'public' ORDER BY table_name"
              ))
              tables = {r[0] for r in rows}

          expected = {
              "users",
              "participants",
              "survey_responses",
              "growth_cards",
              "alembic_version",
          }
          missing = expected - tables
          if missing:
              print(f"FAIL — missing tables: {missing}", file=sys.stderr)
              sys.exit(1)

          print(f"PASS — schema OK, tables: {sorted(tables)}")
          PYEOF

      - name: Verify unique constraints land correctly
        env:
          DATABASE_URL: postgresql://platform:platform@localhost:5432/platform_ci
        run: |
          python - <<'PYEOF'
          import os, sys
          import sqlalchemy as sa

          engine = sa.create_engine(os.environ["DATABASE_URL"])
          with engine.connect() as conn:
              # growth_cards.participant_id must be unique (migration c4a2f5df8a41)
              rows = conn.execute(sa.text("""
                  SELECT constraint_name
                  FROM information_schema.table_constraints
                  WHERE table_name = 'growth_cards'
                    AND constraint_type = 'UNIQUE'
              """))
              constraints = {r[0] for r in rows}

          if not any("participant_id" in c or "uq_growth_cards" in c for c in constraints):
              print(f"FAIL — unique constraint on growth_cards.participant_id missing. "
                    f"Found: {constraints}", file=sys.stderr)
              sys.exit(1)

          print(f"PASS — growth_cards unique constraint present: {constraints}")
          PYEOF

      - name: flask db downgrade (rollback smoke)
        env:
          FLASK_ENV: production
          DATABASE_URL: postgresql://platform:platform@localhost:5432/platform_ci
          SECRET_KEY: ci-only-not-for-prod-000000000000000000000000000000
          GOOGLE_SHEET_ID: ci-placeholder
        run: |
          flask db downgrade -1
          flask db upgrade
          echo "PASS — downgrade/upgrade round-trip clean"